<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Server | By GoDxDeViL</title>
    <style>
        :root {
            --primary-blue: #3498db;
            --primary-red: #e74c3c;
            --primary-pink: #e84393;
            --primary-white: #ecf0f1;
            --dark-bg: #2c3e50;
            --darker-bg: #1a252f;
            --light-bg: #34495e;
            --accent-color: #f1c40f;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--primary-white);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(52, 152, 219, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(231, 76, 60, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 50% 50%, rgba(232, 67, 147, 0.1) 0%, transparent 30%);
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-pink));
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary-blue), var(--primary-pink), var(--primary-red));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .card {
            background-color: var(--light-bg);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border-left: 5px solid var(--primary-blue);
        }
        
        .card.red {
            border-left-color: var(--primary-red);
        }
        
        .card.pink {
            border-left-color: var(--primary-pink);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-white);
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--darker-bg);
            border-radius: 6px;
            font-size: 16px;
            background-color: var(--darker-bg);
            color: var(--primary-white);
            transition: all 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.3);
        }
        
        button {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-pink));
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
        
        button.stop {
            background: linear-gradient(135deg, var(--primary-red), #c0392b);
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-running {
            background-color: #2ecc71;
            box-shadow: 0 0 10px #2ecc71;
        }
        
        .status-stopped {
            background-color: var(--primary-red);
        }
        
        .logs-container {
            background-color: var(--darker-bg);
            border-radius: 8px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--light-bg);
        }
        
        .log-success {
            color: #2ecc71;
        }
        
        .log-error {
            color: var(--primary-red);
        }
        
        .log-system {
            color: var(--primary-blue);
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background-color: var(--light-bg);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            color: var(--accent-color);
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--primary-white);
            opacity: 0.8;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: var(--primary-white);
            opacity: 0.7;
            font-size: 14px;
        }
        
        .session-key {
            background-color: var(--darker-bg);
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            word-break: break-all;
            margin: 15px 0;
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>WhatsApp Offline Server Godx</h1>
            <p>Powerful tool for sending offline whtsap msg </p>
        </header>
        
        <div class="card">
            <h2>Start New Session</h2>
            <form id="sendForm">
                <div class="form-group">
                    <label for="creds">WhatsApp Token (Base64 Encoded)</label>
                    <textarea name="creds" id="creds" rows="4" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="sms">Message File (TXT)</label>
                    <input type="file" name="sms" id="sms" accept=".txt" required>
                </div>
                
                <div class="form-group">
                    <label for="targetType">Target Type</label>
                    <select name="targetType" id="targetType" required>
                        <option value="inbox">Individual Chat</option>
                        <option value="group">Group Chat</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="targetNumber">Target Number/Group ID</label>
                    <input type="text" name="targetNumber" id="targetNumber" required>
                </div>
                
                <div class="form-group">
                    <label for="hatersName">Prefix Text</label>
                    <input type="text" name="hatersName" id="hatersName" required>
                </div>
                
                <div class="form-group">
                    <label for="timeDelay">Delay Between Messages (seconds)</label>
                    <input type="number" name="timeDelay" id="timeDelay" min="1" value="5" required>
                </div>
                
                <button type="submit">Start Sending Messages</button>
            </form>
        </div>
        
        <div class="card red hidden" id="sessionControlCard">
            <h2>Active Session Control</h2>
            <div id="sessionInfo"></div>
            
            <div class="stats-container" id="statsContainer"></div>
            
            <h3>Live Logs</h3>
            <div class="logs-container" id="logsContainer"></div>
            
            <button class="stop" id="stopButton">Stop Session</button>
        </div>
        
        <div class="card pink">
            <h2>Stop Existing Session</h2>
            <form id="stopForm">
                <div class="form-group">
                    <label for="sessionKey">Session Key</label>
                    <input type="text" name="sessionKey" id="stopSessionKey" required>
                </div>
                <button type="submit" class="stop">Stop Session</button>
            </form>
        </div>
        
        <footer>
            <p>Designed by <strong>GODXDEVIL🖤</strong> | SURYAPUTRA.K4RN🏹</p>
        </footer>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sendForm = document.getElementById('sendForm');
            const stopForm = document.getElementById('stopForm');
            const sessionControlCard = document.getElementById('sessionControlCard');
            const sessionInfo = document.getElementById('sessionInfo');
            const logsContainer = document.getElementById('logsContainer');
            const statsContainer = document.getElementById('statsContainer');
            const stopButton = document.getElementById('stopButton');
            
            let ws = null;
            let currentSessionKey = null;
            
            // Handle form submission for sending messages
            sendForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const formData = new FormData(sendForm);
                
                fetch('/send', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        currentSessionKey = data.sessionKey;
                        startSessionMonitoring(currentSessionKey);
                    } else {
                        alert('Error: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('An error occurred. Please try again.');
                });
            });
            
            // Handle form submission for stopping session
            stopForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const sessionKey = document.getElementById('stopSessionKey').value;
                
                fetch('/stop', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ sessionKey })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message);
                        if (sessionKey === currentSessionKey) {
                            stopSessionMonitoring();
                        }
                    } else {
                        alert('Error: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('An error occurred. Please try again.');
                });
            });
            
            // Handle manual stop button
            stopButton.addEventListener('click', function() {
                if (currentSessionKey) {
                    fetch('/stop', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ sessionKey: currentSessionKey })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            alert(data.message);
                            stopSessionMonitoring();
                        } else {
                            alert('Error: ' + data.message);
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('An error occurred. Please try again.');
                    });
                }
            });
            
            function startSessionMonitoring(sessionKey) {
                // Show session control card
                sessionControlCard.classList.remove('hidden');
                
                // Connect to WebSocket for live logs
                ws = new WebSocket(`ws://${window.location.host}`);
                
                ws.onopen = function() {
                    ws.send(JSON.stringify({
                        type: 'subscribe',
                        sessionKey: sessionKey
                    }));
                };
                
                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'log') {
                        addLogEntry(data.data);
                    } else if (data.type === 'logs') {
                        logsContainer.innerHTML = '';
                        data.data.forEach(log => addLogEntry(log));
                    }
                };
                
                // Start polling for session status
                pollSessionStatus(sessionKey);
            }
            
            function stopSessionMonitoring() {
                if (ws) {
                    ws.close();
                    ws = null;
                }
                
                sessionControlCard.classList.add('hidden');
                currentSessionKey = null;
                logsContainer.innerHTML = '';
                statsContainer.innerHTML = '';
            }
            
            function pollSessionStatus(sessionKey) {
                fetch(`/status/${sessionKey}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            updateSessionInfo(data);
                            
                            if (data.running) {
                                setTimeout(() => pollSessionStatus(sessionKey), 2000);
                            } else {
                                stopSessionMonitoring();
                            }
                        } else {
                            stopSessionMonitoring();
                        }
                    })
                    .catch(error => {
                        console.error('Error polling session status:', error);
                        setTimeout(() => pollSessionStatus(sessionKey), 5000);
                    });
            }
            
            function updateSessionInfo(data) {
                // Update session info
                sessionInfo.innerHTML = `
                    <h3>Session Information</h3>
                    <p><strong>Status:</strong> 
                        <span class="status-indicator ${data.running ? 'status-running' : 'status-stopped'}"></span>
                        ${data.running ? 'RUNNING' : 'STOPPED'}
                    </p>
                    <p><strong>Target:</strong> ${data.targetNumber} (${data.targetType})</p>
                    <p><strong>Started At:</strong> ${new Date(data.startTime).toLocaleString()}</p>
                    <p><strong>Session Key:</strong></p>
                    <div class="session-key">${currentSessionKey}</div>
                `;
                
                // Update stats
                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Messages Sent</div>
                        <div class="stat-value">${data.sentCount}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Failed Messages</div>
                        <div class="stat-value">${data.failedCount}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Success Rate</div>
                        <div class="stat-value">${data.sentCount + data.failedCount > 0 
                            ? Math.round((data.sentCount / (data.sentCount + data.failedCount)) * 100) 
                            : 0}%</div>
                    </div>
                `;
            }
            
            function addLogEntry(log) {
                const logEntry = document.createElement('div');
                logEntry.className = 'log-entry';
                
                if (log.includes('[SUCCESS]')) {
                    logEntry.classList.add('log-success');
                } else if (log.includes('[ERROR]')) {
                    logEntry.classList.add('log-error');
                } else if (log.includes('[SYSTEM]')) {
                    logEntry.classList.add('log-system');
                }
                
                logEntry.textContent = log;
                logsContainer.appendChild(logEntry);
                logsContainer.scrollTop = logsContainer.scrollHeight;
            }
            
            // Check if we have a session key in URL hash
            if (window.location.hash) {
                const sessionKey = window.location.hash.substring(1);
                fetch(`/status/${sessionKey}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success && data.running) {
                            currentSessionKey = sessionKey;
                            startSessionMonitoring(sessionKey);
                        }
                    });
            }
        });
    </script>
</body>
</html>
